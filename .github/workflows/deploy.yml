# Builds both frontend SPAs and pushes to GHCR.
# Watchtower on the server will pull the new images automatically.
#
# Required GitHub Secrets:
#   VITE_DEV_CONSOLE_API_URL     — e.g. http://console-api.eagle.lan
#   VITE_END_USER_API_URL        — e.g. http://console-api.eagle.lan
#   VITE_MICROSOFT_TENANT_ID     — Azure AD tenant ID

name: Build & Push Frontends

on:
  push:
    branches: [deploy]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push dev-console-frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BUILD_APP=eagle-dev-console-frontend
            VITE_API_BASE_URL=${{ secrets.VITE_DEV_CONSOLE_API_URL }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/eagle-dev-console-frontend:latest
            ghcr.io/${{ github.repository_owner }}/eagle-dev-console-frontend:${{ github.sha }}
          cache-from: type=gha,scope=dev-console-frontend
          cache-to: type=gha,scope=dev-console-frontend,mode=max

      - name: Build & push end-user-panel
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            BUILD_APP=eagle-end-user-panel
            VITE_API_BASE_URL=${{ secrets.VITE_END_USER_API_URL }}
            VITE_MICROSOFT_TENANT_ID=${{ secrets.VITE_MICROSOFT_TENANT_ID }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/eagle-end-user-panel:latest
            ghcr.io/${{ github.repository_owner }}/eagle-end-user-panel:${{ github.sha }}
          cache-from: type=gha,scope=end-user-panel
          cache-to: type=gha,scope=end-user-panel,mode=max
